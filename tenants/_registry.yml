# Registro de tenants (clientes) activos del servicio.
#
# Cada entrada se corresponde con una carpeta tenants/<slug>/ self-contained:
#   - index.html, style.css, js/    -> front clonado desde la raiz del repo
#   - config/branding.json          -> nombre, color, logo
#   - config/config.json            -> markup, iva, descuentos especificos
#   - config/clients.yml            -> destinatarios Telegram de este tenant
#   - data/*.gz                     -> precios del cliente
#   - latest-json-filename.txt      -> pointer al ultimo dataset
#   - netlify.toml                  -> config del site Netlify de este cliente
#
# Cada tenant tiene su propio Netlify site con publish dir = tenants/<slug>.
#
# Estado:
#   active   = en produccion, recibe data + cron + Telegram
#   testing  = piloto / mock data, NO se actualiza automatico desde Bertual aun
#   inactive = pausado

tenants:
  - slug: el-industrial
    name: "El Industrial"
    state: active
    netlify_url: "https://el-industrial.netlify.app"
    bertual_account: "default"
    notes: "Tenant original. Migracion a tenants/el-industrial/ pendiente (Fase 2)."

  - slug: demo-electricidad
    name: "Demo Electricidad (placeholder: 'Tu Empresa Aquí')"
    state: testing
    netlify_url: "https://demo-electricidad.netlify.app"
    netlify_site_id: "0d1ebe3c-6d84-49ba-a62d-64bc0c4e38a4"
    supplier: "Electronica Haedo"
    supplier_account: "(no aplica aun - sin API del proveedor en este demo)"
    notes: |
      Cliente DEMO para mostrar el branding del servicio a prospects del rubro
      electrico. El proveedor mayorista de referencia es Electronica Haedo (asi
      como Bertual lo es para el-industrial). siteName='Tu Empresa Aquí' es
      placeholder; en una venta real, el cliente nos da su nombre y logo.
      Auto-deploy a Netlify activo en sync_tenants si NETLIFY_AUTH_TOKEN esta
      en el .env.
