name: Test Bertual Reachability from GH Runners

# Workflow descartable para validar si los runners de GitHub Actions
# pueden alcanzar la API de Bertual. Si funciona: podemos habilitar
# update_products en failover.yml (no solo notificacion).
# Disparalo manual desde la pestaña Actions cuando quieras testear.

on:
  workflow_dispatch:

env:
  TZ: America/Argentina/Buenos_Aires

jobs:
  reach-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: 1) curl al endpoint Bertual (sin auth)
        run: |
          echo "=== curl GET (sin auth) ==="
          curl -v --max-time 30 -o /tmp/bertual_root.html -w "HTTP=%{http_code} time=%{time_total}s\n" \
            "https://autogestion-ehaedo.bertual.com.ar:8200/api" 2>&1 | tail -30 || echo "curl exit=$?"
          echo "---"
          ls -lah /tmp/bertual_root.html || true
          head -c 500 /tmp/bertual_root.html || true

      - name: 2) Test login real con creds (si están como secret)
        env:
          BERTUAL_CUIT: ${{ secrets.BERTUAL_CUIT }}
          BERTUAL_PASSWORD: ${{ secrets.BERTUAL_PASSWORD }}
          BERTUAL_CLIENT_ID: ${{ secrets.BERTUAL_CLIENT_ID }}
        run: |
          if [ -z "$BERTUAL_CUIT" ] || [ -z "$BERTUAL_PASSWORD" ]; then
            echo "::warning::Falta BERTUAL_CUIT o BERTUAL_PASSWORD en secrets. Skip test de login."
            exit 0
          fi
          echo "=== fetch_products via bertual_api.py ==="
          python3 -c "
          import sys, time
          sys.path.insert(0, 'scripts')
          from bertual_api import BertualAPIClient
          t0 = time.time()
          c = BertualAPIClient()
          items = c.fetch_products()
          dt = time.time() - t0
          if items:
              print(f'OK: {len(items)} items en {dt:.1f}s')
              print('sample:', items[0] if items else None)
          else:
              print(f'FAIL: 0 items o None en {dt:.1f}s')
              sys.exit(1)
          " 2>&1 | tail -40

      - name: 3) Resultado
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "Si los 2 pasos arriba fueron OK -> habilitar"
          echo "update_products en failover.yml/fallback_sync.yml."
          echo "Si falló con timeout -> Bertual bloquea IPs GH."
          echo "=========================================="
