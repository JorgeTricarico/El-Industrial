name: "Watchdog Failover"

on:
  schedule:
    # 02:30 UTC = 23:30 AR. DESPUES del ultimo Pi cron (22:00 AR + buffer).
    # Si corriera antes, generaria falsos positivos: el-industrial no recibio
    # Telegram todavia, pero la Pi aun no tuvo su chance.
    - cron: '30 2 * * *'
  workflow_dispatch: # Permite correrlo manualmente para pruebas

env:
  TZ: America/Argentina/Buenos_Aires

jobs:
  check-and-failover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Verify LLM secrets present
        run: |
          # Falla si falta alguna clave (sin imprimir el valor)
          [ -n "${{ secrets.GEMINI_API_KEY }}" ]   || { echo "::error::GEMINI_API_KEY vacio"; exit 1; }
          [ -n "${{ secrets.CEREBRAS_API_KEY }}" ] || { echo "::error::CEREBRAS_API_KEY vacio"; exit 1; }
          [ -n "${{ secrets.SAMBANOVA_API_KEY }}" ]     || { echo "::error::SAMBANOVA_API_KEY vacio"; exit 1; }
          [ -n "${{ secrets.TELEGRAM_TOKEN }}" ]   || { echo "::error::TELEGRAM_TOKEN vacio"; exit 1; }
          echo "OK: 3 LLM keys + telegram presentes"

      - name: Run Heartbeat Check and Failover
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
        run: |
          set -e
          FILE_DATE=$(date +%y-%m-%d)
          TODAY_TAG="[run:$FILE_DATE]"
          TODAY_AR=$(date +%Y-%m-%d)
          # weekday: 1=Lun..7=Dom. Lun-Sab => 1..6
          WEEKDAY=$(date +%u)

          # Determinar tenants pendientes de Telegram para HOY
          # Iteramos hb.tenants.<slug>.last_telegram_iso. Si no es de hoy: pendiente.
          PENDING=()
          if [ -f tenants/_registry.yml ]; then
            ACTIVE_SLUGS=$(python3 -c "
          import yaml,sys
          d=yaml.safe_load(open('tenants/_registry.yml'))
          for t in d.get('tenants',[]):
              if t.get('state')=='active': print(t['slug'])
          ")
            for slug in $ACTIVE_SLUGS; do
              if [ -f status/heartbeat.json ]; then
                LAST_TG=$(jq -r ".tenants.\"$slug\".last_telegram_iso // \"\"" status/heartbeat.json)
                LAST_TG_DAY=$(echo "$LAST_TG" | cut -c1-10)
              else
                LAST_TG_DAY=""
              fi
              if [ "$LAST_TG_DAY" != "$TODAY_AR" ]; then
                PENDING+=("$slug")
              fi
            done
          fi

          if [ ${#PENDING[@]} -eq 0 ]; then
            echo "Todos los tenants ya recibieron Telegram hoy. Watchdog en espera."
            exit 0
          fi

          echo "Tenants pendientes hoy: ${PENDING[*]}"

          # Si es Domingo Y NO pasaron > 24h sin run -> esperar (Pi cron normal cubre).
          if [ "$WEEKDAY" = "7" ]; then
            MAX_AGE_H=$(python3 -c "
          import json, datetime
          try:
              hb = json.load(open('status/heartbeat.json'))
          except Exception:
              print(999); raise SystemExit
          nodes = hb.get('nodes', {})
          if not nodes:
              print(999); raise SystemExit
          now = datetime.datetime.now()
          ages = []
          for n in nodes.values():
              lr = n.get('last_run')
              if not lr: continue
              try:
                  dt = datetime.datetime.fromisoformat(lr.replace('Z',''))
                  ages.append((now - dt).total_seconds() / 3600)
              except Exception:
                  continue
          print(int(min(ages)) if ages else 999)
          ")
            if [ "$MAX_AGE_H" -lt 24 ]; then
              echo "Domingo y nodos vivos (< 24h). Skip."
              exit 0
            fi
          fi

          echo "Activando failover (sin fetch a Bertual, manda filler)."
          python3 scripts/notify_pi_offline.py || true
          python3 scripts/nightly_report.py || true

          git config --global user.name "GitHub Action Watchdog"
          git config --global user.email "actions@github.com"
          # Whitelist: solo heartbeat (commit chico). Otros archivos los manejan los nodos locales.
          git add status/heartbeat.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: watchdog failover envio [GH-Actions] $TODAY_TAG [skip ci]"
            git push origin main
          else
            echo "Sin cambios en heartbeat para commitear."
          fi

      - name: Healthcheck (alerta si algo huele mal)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # ai_diagnose usa la cadena de fallback de nightly_report; sin keys
          # cae a template y manda mensajes pobres.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
        # continue-on-error porque exit-code != 0 indica "alerta enviada", no falla CI
        continue-on-error: true
        run: python3 scripts/healthcheck.py
