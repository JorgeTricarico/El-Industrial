name: "E2E Post-Deploy"

# Corre tests Playwright contra los sites de Netlify de produccion despues
# de que la Pi haya completado su ciclo nocturno (~20:00 AR = 23:00 UTC).
# Si fallan, Telegram inmediato al admin: "los compradores estan viendo algo roto".

on:
  schedule:
    # 00:30 UTC = 21:30 AR. 1h30 despues del cron primario de la Pi (20:00 AR).
    # Da tiempo a que sync_tenants haga su deploy + propagacion en Netlify CDN.
    - cron: '30 0 * * *'
    # Y al mediodia UTC (~09:00 AR) por las dudas.
    - cron: '0 12 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'tests/e2e/**'
      - 'js/**'
      - 'index.html'
      - 'style.css'

env:
  TZ: America/Argentina/Buenos_Aires

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Run E2E contra Netlify de produccion
        id: e2e
        run: npx playwright test tests/e2e/ --reporter=list

      - name: Subir HTML report como artifact (solo si fallo)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/report
          retention-days: 14

      - name: Alerta Telegram al admin si fallo
        # Solo en cron real (schedule). Si dispare manual (workflow_dispatch),
        # ya estoy mirando el resultado yo mismo — no spamear el chat por
        # iteraciones de debug. Aplica el mismo principio en healthcheck/audit.
        if: failure() && github.event_name == 'schedule'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          # Preferir canal tecnico si esta configurado, sino comercial (legacy).
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_TECH_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG="🔴 <b>E2E post-deploy FALLO</b>%0A%0AAlgun sitio publico de cliente no funciona como debe.%0A%0ARun: ${RUN_URL}%0A%0AAccion: revisar el artifact playwright-report del run para ver screenshots de los fallos."
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=HTML" || true
