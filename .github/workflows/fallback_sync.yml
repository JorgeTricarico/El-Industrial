name: Cloud Fallback Sync

on:
  schedule:
    - cron: '30 23 * * *' 
  workflow_dispatch: 

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify if update is needed
        id: check_sync
        run: |
          TODAY=$(date +%y-%m-%d)
          TODAY_TAG="[run:$TODAY]"
          echo "today_tag=$TODAY_TAG" >> $GITHUB_OUTPUT

          # Check 1: el archivo de datos del dia ya esta presente
          LATEST_FILE=$(cat latest-json-filename.txt 2>/dev/null || echo "")
          FILE_DATE=$(echo "$LATEST_FILE" | grep -oE '[0-9]{2}-[0-9]{2}-[0-9]{2}' || echo "")

          # Check 2: dedup via commit marker (cualquier nodo ya corrio hoy)
          if git log origin/main --format=%s -5 | grep -qF "$TODAY_TAG"; then
            echo "Commit-marker de hoy ya presente. Skip."
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [ "$FILE_DATE" == "$TODAY" ]; then
            echo "El archivo de datos ya esta al dia ($FILE_DATE). Skip."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "No se detecto actualizacion hoy. Iniciando FALLBACK."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.check_sync.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        if: steps.check_sync.outputs.skip == 'false'
        run: |
          pip install requests xlsxwriter python-dotenv

      - name: Verify LLM secrets present
        if: steps.check_sync.outputs.skip == 'false'
        run: |
          [ -n "${{ secrets.GEMINI_API_KEY }}" ]   || { echo "::error::GEMINI_API_KEY vacio"; exit 1; }
          [ -n "${{ secrets.CEREBRAS_API_KEY }}" ] || { echo "::error::CEREBRAS_API_KEY vacio"; exit 1; }
          [ -n "${{ secrets.SAMBANOVA_API_KEY }}" ]     || { echo "::error::SAMBANOVA_API_KEY vacio"; exit 1; }
          [ -n "${{ secrets.TELEGRAM_TOKEN }}" ]   || { echo "::error::TELEGRAM_TOKEN vacio"; exit 1; }
          echo "OK: 3 LLM keys + telegram presentes"

      # NOTA: la API de Bertual NO es accesible desde runners de GitHub Actions (timeout).
      # Por eso este fallback NO intenta update_products.py — solo avisa al cliente
      # que la Pi no respondio y corre el reporte con el daily_accum que haya.
      - name: Notificar que la Pi no respondio hoy
        if: steps.check_sync.outputs.skip == 'false'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/notify_pi_offline.py

      - name: Intentar reporte con datos previos (best effort)
        if: steps.check_sync.outputs.skip == 'false'
        continue-on-error: true
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
        run: python scripts/nightly_report.py

      - name: Commit y push del archivo de aviso (si hubo cambios)
        if: steps.check_sync.outputs.skip == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Fallback"
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "Cloud Fallback: aviso Pi offline [GH-Actions] ${{ steps.check_sync.outputs.today_tag }} [skip ci]"
            git push origin main
          else
            echo "Sin cambios para commitear."
          fi
