name: Cloud Fallback Sync

on:
  schedule:
    - cron: '30 23 * * *' 
  workflow_dispatch: 

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify if update is needed
        id: check_sync
        run: |
          LATEST_FILE=$(cat latest-json-filename.txt)
          FILE_DATE=$(echo $LATEST_FILE | grep -oE '[0-9]{2}-[0-9]{2}-[0-9]{2}')
          TODAY=$(date +%y-%m-%d)
          
          if [ "$FILE_DATE" == "$TODAY" ]; then
            echo "✅ El sistema ya está al día ($FILE_DATE). Abortando ejecución para ahorrar recursos."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No se detectó actualización hoy. Iniciando FALLBACK."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.check_sync.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        if: steps.check_sync.outputs.skip == 'false'
        run: |
          pip install requests xlsxwriter python-dotenv

      - name: Run Update (Fallback)
        if: steps.check_sync.outputs.skip == 'false'
        env:
          BERTUAL_CUIT: ${{ secrets.BERTUAL_CUIT }}
          BERTUAL_PASSWORD: ${{ secrets.BERTUAL_PASSWORD }}
          BERTUAL_CLIENT_ID: ${{ secrets.BERTUAL_CLIENT_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/update_products.py
          python scripts/nightly_report.py

      - name: Commit and Push
        if: steps.check_sync.outputs.skip == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Fallback"
          git add .
          git commit -m "🚀 Cloud Fallback: Actualización automática (Nodos locales offline)"
          git push origin main
