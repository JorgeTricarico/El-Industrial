name: Cloud Fallback Sync

on:
  schedule:
    # 02:45 UTC = 23:45 AR. DESPUES del Pi cron de las 22:00 AR + buffer.
    # Y DESPUES del failover.yml (02:30 UTC) — son redundantes pero el
    # fallback_sync intenta tambien sync front, no solo nightly_report.
    - cron: '45 2 * * *'
  workflow_dispatch:

env:
  TZ: America/Argentina/Buenos_Aires

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify if update is needed
        id: check_sync
        run: |
          TODAY=$(date +%y-%m-%d)
          TODAY_AR=$(date +%Y-%m-%d)
          TODAY_TAG="[run:$TODAY]"
          WEEKDAY=$(date +%u)  # 1=Lun..7=Dom
          echo "today_tag=$TODAY_TAG" >> $GITHUB_OUTPUT

          # Skip si Domingo y no estamos en garantia (defecto Lun-Sab).
          if [ "$WEEKDAY" = "7" ]; then
            echo "Domingo. Skip fallback (no es dia garantizado)."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Garantia per-tenant: si algun tenant active no recibio Telegram HOY -> fallback.
          if [ -f tenants/_registry.yml ] && [ -f status/heartbeat.json ]; then
            PENDING=$(python3 -c "
          import yaml, json, sys
          reg = yaml.safe_load(open('tenants/_registry.yml')) or {}
          try:
              hb = json.load(open('status/heartbeat.json'))
          except Exception:
              hb = {}
          tenants_hb = hb.get('tenants', {})
          today = '$TODAY_AR'
          pending = []
          for t in reg.get('tenants', []):
              if t.get('state') != 'active': continue
              slug = t['slug']
              iso = (tenants_hb.get(slug) or {}).get('last_telegram_iso', '')
              if iso[:10] != today:
                  pending.append(slug)
          print(','.join(pending))
          ")
            if [ -z "$PENDING" ]; then
              echo "Todos los tenants ya recibieron Telegram hoy. Skip."
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "Tenants pendientes: $PENDING. Iniciando FALLBACK."
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Sin heartbeat o registry. Iniciando FALLBACK por las dudas."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.check_sync.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        if: steps.check_sync.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Verify LLM secrets present
        if: steps.check_sync.outputs.skip == 'false'
        run: |
          [ -n "${{ secrets.GEMINI_API_KEY }}" ]   || { echo "::error::GEMINI_API_KEY vacio"; exit 1; }
          [ -n "${{ secrets.CEREBRAS_API_KEY }}" ] || { echo "::error::CEREBRAS_API_KEY vacio"; exit 1; }
          [ -n "${{ secrets.SAMBANOVA_API_KEY }}" ]     || { echo "::error::SAMBANOVA_API_KEY vacio"; exit 1; }
          [ -n "${{ secrets.TELEGRAM_TOKEN }}" ]   || { echo "::error::TELEGRAM_TOKEN vacio"; exit 1; }
          echo "OK: 3 LLM keys + telegram presentes"

      # NOTA: la API de Bertual NO es accesible desde runners de GitHub Actions (timeout).
      # Por eso este fallback NO intenta update_products.py — solo avisa al cliente
      # que la Pi no respondio y corre el reporte con el daily_accum que haya.
      - name: Notificar que la Pi no respondio hoy
        if: steps.check_sync.outputs.skip == 'false'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/notify_pi_offline.py

      - name: Intentar reporte con datos previos (best effort)
        if: steps.check_sync.outputs.skip == 'false'
        continue-on-error: true
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
        run: python scripts/nightly_report.py

      - name: Commit y push del heartbeat actualizado
        if: steps.check_sync.outputs.skip == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Fallback"
          # Whitelist: solo heartbeat. Evitamos git add . que arrastraria
          # cualquier archivo accidental (lesson learned del .env.backup).
          git add status/heartbeat.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Cloud Fallback: envio garantizado [GH-Actions] ${{ steps.check_sync.outputs.today_tag }} [skip ci]"
            git push origin main
          else
            echo "Sin cambios en heartbeat para commitear."
          fi
